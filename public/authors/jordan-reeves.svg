<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400" role="img" aria-label="Jordan Reeves">
	<defs>
		<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#3B5BDB"/>
			<stop offset="55%" stop-color="#5C7CFA"/>
			<stop offset="100%" stop-color="#748FFC"/>
		</linearGradient>
		<linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#FAD7B8"/>
			<stop offset="100%" stop-color="#E8B98C"/>
		</linearGradient>
		<linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#3A2516"/>
			<stop offset="100%" stop-color="#2A1A0F"/>
		</linearGradient>
		<linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
			<stop offset="0%" stop-color="#1F2937"/>
			<stop offset="100%" stop-color="#0F172A"/>
		</linearGradient>
		<radialGradient id="cheek" cx="0.5" cy="0.5" r="0.5">
			<stop offset="0%" stop-color="#E89F7B" stop-opacity="0.55"/>
			<stop offset="100%" stop-color="#E89F7B" stop-opacity="0"/>
		</radialGradient>
	</defs>

	<!-- background circle -->
	<circle cx="200" cy="200" r="200" fill="url(#bg)"/>

	<!-- shoulders / shirt -->
	<path d="M 60 400 Q 60 300 130 280 L 270 280 Q 340 300 340 400 Z" fill="url(#shirt)"/>
	<!-- shirt collar v -->
	<path d="M 175 280 L 200 320 L 225 280 Z" fill="#0B1220"/>

	<!-- neck -->
	<rect x="180" y="240" width="40" height="60" rx="6" fill="url(#skin)"/>
	<rect x="180" y="240" width="40" height="20" fill="#D9A877" opacity="0.4"/>

	<!-- face -->
	<ellipse cx="200" cy="180" rx="78" ry="92" fill="url(#skin)"/>

	<!-- ears -->
	<ellipse cx="124" cy="190" rx="10" ry="16" fill="url(#skin)"/>
	<ellipse cx="276" cy="190" rx="10" ry="16" fill="url(#skin)"/>

	<!-- hair: short, side-parted -->
	<path d="M 130 145
	         Q 130 92 200 88
	         Q 270 90 270 150
	         Q 270 130 248 122
	         Q 230 138 200 134
	         Q 175 132 158 142
	         Q 140 152 130 165 Z" fill="url(#hair)"/>

	<!-- subtle cheek blush -->
	<circle cx="155" cy="208" r="20" fill="url(#cheek)"/>
	<circle cx="245" cy="208" r="20" fill="url(#cheek)"/>

	<!-- eyebrows -->
	<rect x="156" y="174" width="32" height="6" rx="3" fill="#2A1A0F"/>
	<rect x="212" y="174" width="32" height="6" rx="3" fill="#2A1A0F"/>

	<!-- eyes -->
	<ellipse cx="172" cy="194" rx="6" ry="7" fill="#1F2937"/>
	<ellipse cx="228" cy="194" rx="6" ry="7" fill="#1F2937"/>
	<!-- eye highlights -->
	<circle cx="174" cy="192" r="1.6" fill="#fff"/>
	<circle cx="230" cy="192" r="1.6" fill="#fff"/>

	<!-- nose -->
	<path d="M 200 200 Q 196 218 192 230 Q 200 234 208 230 Q 204 218 200 200 Z" fill="#D9A877" opacity="0.55"/>

	<!-- mouth: gentle smile -->
	<path d="M 178 244 Q 200 256 222 244" stroke="#7E3F2A" stroke-width="3.2" fill="none" stroke-linecap="round"/>
	<path d="M 182 245 Q 200 252 218 245" fill="#C9806A" opacity="0.4"/>
</svg>
