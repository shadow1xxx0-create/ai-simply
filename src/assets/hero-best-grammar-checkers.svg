<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1f14"/>
      <stop offset="100%" style="stop-color:#0a1a10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1080" cy="140" r="240" fill="#22c55e" opacity="0.07"/>
  <circle cx="120" cy="520" r="220" fill="#10b981" opacity="0.06"/>

  <!-- Document card -->
  <rect x="340" y="110" width="520" height="360" rx="18" fill="#132019" stroke="#22c55e" stroke-width="2" opacity="0.95"/>

  <!-- Title bar -->
  <rect x="370" y="150" width="220" height="16" rx="8" fill="#22c55e" opacity="0.85"/>
  <rect x="602" y="152" width="50" height="12" rx="6" fill="white" opacity="0.25"/>

  <!-- Paragraph line 1 -->
  <rect x="370" y="195" width="440" height="11" rx="5" fill="white" opacity="0.4"/>

  <!-- Line with error (strikethrough) + suggestion above -->
  <rect x="370" y="223" width="110" height="11" rx="5" fill="#ef4444" opacity="0.35"/>
  <line x1="370" y1="228" x2="480" y2="228" stroke="#ef4444" stroke-width="2"/>
  <rect x="370" y="205" width="100" height="10" rx="5" fill="url(#accent)" opacity="0.9"/>
  <rect x="490" y="223" width="320" height="11" rx="5" fill="white" opacity="0.35"/>

  <!-- Paragraph line 3 -->
  <rect x="370" y="253" width="400" height="11" rx="5" fill="white" opacity="0.4"/>

  <!-- Underlined clarity suggestion -->
  <rect x="370" y="283" width="150" height="11" rx="5" fill="white" opacity="0.35"/>
  <rect x="530" y="283" width="130" height="11" rx="5" fill="#fbbf24" opacity="0.5"/>
  <line x1="530" y1="298" x2="660" y2="298" stroke="#fbbf24" stroke-width="2" stroke-dasharray="5,3"/>
  <rect x="670" y="283" width="140" height="11" rx="5" fill="white" opacity="0.3"/>

  <!-- More lines -->
  <rect x="370" y="315" width="420" height="11" rx="5" fill="white" opacity="0.35"/>
  <rect x="370" y="345" width="360" height="11" rx="5" fill="white" opacity="0.3"/>
  <rect x="370" y="375" width="300" height="11" rx="5" fill="white" opacity="0.25"/>

  <!-- Score chip -->
  <rect x="370" y="415" width="110" height="32" rx="16" fill="url(#accent)" opacity="0.9"/>
  <text x="425" y="436" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="700" fill="#0a1a10" text-anchor="middle">Score 98</text>

  <!-- Check badge -->
  <circle cx="820" cy="180" r="46" fill="#22c55e" opacity="0.18" stroke="#22c55e" stroke-width="2.5"/>
  <polyline points="800,180 815,196 842,166" fill="none" stroke="#22c55e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Sparkle accents -->
  <text x="290" y="200" font-size="28" fill="#22c55e" opacity="0.7">✦</text>
  <text x="900" y="420" font-size="22" fill="#22c55e" opacity="0.5">✦</text>

  <!-- Title -->
  <text x="600" y="545" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="700" fill="white" text-anchor="middle" opacity="0.95">Best AI Grammar Checkers 2026</text>
  <text x="600" y="585" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="white" text-anchor="middle" opacity="0.55">Grammarly · LanguageTool · ProWritingAid</text>
</svg>
